
<html>  
    <head>
        <title>Contact Us form</title>
        <link rel="stylesheet" href="C:\Users\Lenovo\Documents\Webtech_Spring_25-26_F\Webtech_Spring_25-26_F\lab_performance\design\design.css">
    </head>
    <body>
        <form action="/submit_form" method="post">

            <table>
            <tr>
                <td colspan="2" class="center">
                    <h2>Contact Us</h2>
                </td>
            </tr>
            <tr>
                <td>First Name</td>
                <td>Last Name</td>
            </tr>
            <tr>
                <td ><input type="text" id="firstName"></td>
                <td ><input type="text" id="lastName"></td>
            </tr>
            <tr>
                <td colspan="2">Email</td>
            </tr>
            <tr>
                <td colspan="2"><input type="email" id="email"></td>
            </tr>
            <tr>
                <td colspan="2">Mobile Number</td>
            </tr>
            <tr>
                <td colspan="2"><input type="tel" id="mobile"></td>
            </tr>
            <tr>
                <td colspan="2">What do you have in mind?</td>
            </tr>
            <tr>
                <td colspan="2"><textarea id="message" placeholder="What do you have in mind?"></textarea></td>
            </tr>
            <tr>
                <td colspan="2"><button type="submit">Submit</button></td>
            </tr>
        </table>
        
   
    </body>
</html>
